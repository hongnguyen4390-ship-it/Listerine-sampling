<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listerine Sampling - Nhận Quà Miễn Phí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #f3f4f6; }
        .purple-theme { background-color: #581c87; }
        .input-focus:focus { border-color: #a855f7; ring: 2px #a855f7; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-purple-100">
        <!-- Header -->
        <div class="purple-theme p-8 text-center text-white">
            <div class="inline-block bg-white/20 p-3 rounded-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold uppercase tracking-tight">LISTERINE - ĐĂNG KÝ NHẬN NGAY QUÀ TẶNG 100ML</h1>
            <p class="text-purple-200 text-sm mt-1">BÍNH NGỌ KHỎE XINH - ĂN TẾT HẾT MÌNH</p>
            <!-- Tag hiển thị địa điểm -->
            <div id="location-tag" class="mt-4 inline-block bg-yellow-400 text-purple-900 text-[10px] font-bold px-3 py-1 rounded-full uppercase italic">
                Đang xác định điểm phát...
            </div>
        </div>

        <!-- Nội dung -->
        <div class="p-8">
            <div id="step-form">
                <form id="sampling-form" class="space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Số điện thoại *</label>
                        <input type="tel" id="phone" required placeholder="090xxxxxxx"
                            class="w-full px-4 py-4 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white outline-none transition-all input-focus text-lg">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Tuổi *</label>
                        <input type="number" id="age" required min="10" max="90" placeholder="Ví dụ: 25"
                            class="w-full px-4 py-4 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white outline-none transition-all input-focus text-lg">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Email</label>
                        <input type="email" id="email" placeholder="khachhang@gmail.com"
                            class="w-full px-4 py-4 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white outline-none transition-all input-focus text-lg">
                    </div>

                    <button type="submit" id="btn-submit"
                        class="w-full purple-theme hover:bg-purple-900 text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-200 transition-all active:scale-95 text-lg mt-4">
                        XÁC NHẬN NHẬN QUÀ
                    </button>
                </form>
            </div>

            <div id="step-success" class="hidden text-center py-6">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Đăng ký thành công!</h2>
                <p class="text-gray-500 mt-2 text-sm">Hãy đưa màn hình này cho nhân viên tại quầy để nhận quà nhé.</p>
                
                <div class="mt-8 p-4 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Mã Ưu Đãi</span>
                    <div id="code-display" class="text-3xl font-black text-purple-700 mt-1 tracking-tighter">-------</div>
                </div>
            </div>
        </div>
        
        <div class="p-6 bg-gray-50 border-t border-gray-100 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-medium">© 2026 Listerine Sampling Campaign</p>
        </div>
    </div>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'listerine-100ml-campaign';

        // Danh sách tên quán tương ứng với mã
        const storeNames = {
            "Denda_LVS": "Đen Đá - Lê Văn Sỹ",
            "Denda_Pasteur": "Đen Đá - Pasteur",
            "Bamos_So10": "Bamos - Số 10",
            "Bamos_KimSon": "Bamos - Kim Sơn",
            "Bamos_DQH": "Bamos - Dương Quảng Hàm"
        };

        // Lấy mã quán từ URL (Ưu tiên tham số 'store' rồi đến 'id')
        const params = new URLSearchParams(window.location.search);
        const storeId = params.get('store') || params.get('id') || 'Khach_Vang_Lai';
        
        // Cập nhật tên quán hiển thị trên giao diện
        const displayStoreName = storeNames[storeId] || "Điểm phát lưu động";
        document.getElementById('location-tag').innerText = "Tại: " + displayStoreName;

        let userId = "";
        auth.signInAnonymously().then(cred => {
            userId = cred.user.uid;
            checkDeviceLimit();
        });

        async function checkDeviceLimit() {
            const deviceRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('devices').doc(userId);
            const doc = await deviceRef.get();
            if (doc.exists) {
                showSuccess(doc.data().code);
            }
        }

        const form = document.getElementById('sampling-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-submit');
            const phone = document.getElementById('phone').value.trim();
            const age = document.getElementById('age').value.trim();
            const email = document.getElementById('email').value.trim();

            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";

            try {
                // Kiểm tra trùng SĐT
                const phoneCheck = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations')
                    .where('phone', '==', phone).get();
                
                if (!phoneCheck.empty) {
                    alert("Số điện thoại này đã được sử dụng!");
                    btn.disabled = false;
                    btn.innerText = "XÁC NHẬN NHẬN QUÀ";
                    return;
                }

                const giftCode = "LIS" + Math.floor(1000 + Math.random() * 9000);

                const registrationData = {
                    phone,
                    age: parseInt(age),
                    email: email || "Không có",
                    store: storeId, // Lưu mã quán vào database để Admin thống kê
                    code: giftCode,
                    deviceId: userId,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                // Lưu vào Firestore
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations').add(registrationData);
                
                // Lưu dấu vết thiết bị
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('devices').doc(userId).set({
                    registered: true,
                    code: giftCode
                });

                showSuccess(giftCode);

            } catch (error) {
                console.error(error);
                alert("Lỗi kết nối, vui lòng thử lại!");
                btn.disabled = false;
                btn.innerText = "XÁC NHẬN NHẬN QUÀ";
            }
        };

        function showSuccess(code) {
            document.getElementById('code-display').innerText = code;
            document.getElementById('step-form').classList.add('hidden');
            document.getElementById('step-success').classList.remove('hidden');
        }
    </script>
</body>
</html>
