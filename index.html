<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listerine - Bình Ngọ Khỏe Xinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f3f4f6; 
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 420px;
            background-color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        /* Header hình vòm cung ngược chuẩn ảnh image_858809.png */
        .header-section {
            background: linear-gradient(180deg, #6219ff 0%, #4f17d7 100%);
            height: 180px;
            width: 100%;
            border-bottom-left-radius: 50% 30px;
            border-bottom-right-radius: 50% 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            color: white;
            position: relative;
        }

        /* Thẻ Card trắng bo góc lớn */
        .form-card {
            background: white;
            margin: -65px 20px 40px 20px;
            border-radius: 50px;
            padding: 45px 25px 30px 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 10;
        }

        .title-text {
            font-size: 23px;
            font-weight: 800;
            color: #1e293b;
            line-height: 1.2;
            text-transform: uppercase;
            font-style: italic;
            margin-bottom: 12px;
            text-align: center;
        }

        .location-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: #fdf4ff;
            padding: 5px 15px;
            border-radius: 99px;
            border: 1px solid #fae8ff;
            margin-bottom: 25px;
        }

        .input-label {
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            margin-left: 5px;
            display: block;
        }

        .field-input {
            background-color: #f4f7fa !important;
            border: none !important;
            border-radius: 20px !important;
            padding: 18px 24px !important;
            width: 100%;
            font-size: 17px;
            font-weight: 700;
            color: #334155;
            outline: none;
        }

        .field-input::placeholder {
            color: #cbd5e1;
        }

        .btn-confirm {
            background-color: #9419ff;
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: 22px;
            font-size: 19px;
            font-weight: 800;
            text-transform: uppercase;
            font-style: italic;
            margin-top: 10px;
            box-shadow: 0 12px 30px rgba(148, 25, 255, 0.3);
            transition: all 0.2s;
        }

        .btn-confirm:active {
            transform: scale(0.97);
        }

        /* Checkbox cụm nội dung pháp lý */
        .consent-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0 15px 5px;
        }

        .consent-wrapper input {
            accent-color: #9419ff;
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
        }

        .consent-label {
            font-size: 10px;
            color: #94a3b8;
            line-height: 1.4;
            font-weight: 600;
            cursor: pointer;
        }

        .footer-text {
            font-size: 8px;
            font-weight: 700;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 60px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Header -->
        <div class="header-section">
            <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">LISTERINE®</h1>
            <p class="text-[9px] font-bold uppercase tracking-[0.25em] mt-2 opacity-90">Bình Ngọ Khỏe Xinh - Ăn Tết Hết Mình</p>
        </div>

        <!-- Form Content -->
        <div class="form-card">
            <div id="step-form">
                <div class="text-center">
                    <h2 class="title-text">
                        Đăng ký nhận ngay quà <br> tặng 100ml
                    </h2>
                    
                    <div class="location-tag mx-auto">
                        <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                        <span id="location-tag" class="text-[10px] font-black text-purple-600 uppercase italic">Đang xác định điểm...</span>
                    </div>
                </div>

                <form id="sampling-form" class="space-y-5">
                    <div>
                        <label class="input-label">Số điện thoại *</label>
                        <input type="tel" id="phone" required placeholder="09xxxxxxxx" class="field-input">
                    </div>

                    <div>
                        <label class="input-label">Email</label>
                        <input type="email" id="email" placeholder="example@email.com" class="field-input">
                    </div>

                    <div>
                        <label class="input-label">Tuổi *</label>
                        <select id="age" required class="field-input appearance-none bg-no-repeat bg-[right_24px_center]" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23cbd5e1%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-size: 16px;">
                            <option value="" disabled selected>Chọn độ tuổi</option>
                            <option value="18 - 25">18 - 25</option>
                            <option value="26 - 35">26 - 35</option>
                            <option value="Trên 35">Trên 35</option>
                        </select>
                    </div>

                    <!-- PHẦN BỔ SUNG: Checkbox pháp lý -->
                    <div class="consent-wrapper">
                        <input type="checkbox" id="consent" required>
                        <label for="consent" class="consent-label">
                            Tôi đồng ý chia sẻ thông tin và cho phép nhãn hàng sử dụng dữ liệu cá nhân cho mục đích tư vấn, nhận thông tin ưu đãi từ nhãn hàng.
                        </label>
                    </div>

                    <button type="submit" id="btn-submit" class="btn-confirm">
                        Xác nhận & Nhận mã
                    </button>
                </form>
            </div>

            <!-- Success State (Overlay) -->
            <div id="step-success" class="hidden fixed inset-0 z-50 bg-white flex flex-col items-center justify-center p-10 text-center animate-in fade-in duration-300">
                <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mb-8">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-3xl font-black text-slate-800 uppercase italic tracking-tighter mb-3">Đăng ký xong!</h2>
                <p class="text-slate-400 text-sm font-medium mb-12">Đưa mã ưu đãi này cho nhân viên tại quầy để nhận quà.</p>
                
                <div class="w-full bg-slate-50 p-10 rounded-[3rem] border-2 border-dashed border-slate-200">
                    <span class="text-[10px] text-slate-300 font-black uppercase tracking-[0.4em] block mb-4">Mã Của Bạn</span>
                    <div id="code-display" class="text-5xl font-black text-purple-600 tracking-widest italic uppercase">-------</div>
                </div>
                
                <button onclick="location.reload()" class="mt-16 text-slate-300 text-[10px] font-black uppercase tracking-widest border-b border-slate-100 pb-1">Đăng ký mới</button>
            </div>

            <div class="footer-text uppercase">Listerine Campaign 2026</div>
        </div>
    </div>

    <script>
        // GIỮ NGUYÊN LOGIC FIREBASE TỪ SOURCE CỦA CHỊ
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'listerine-100ml-campaign';

        const storeNames = {
            "Denda_LVS": "Đen Đá - Lê Văn Sỹ",
            "Denda_Pasteur": "Đen Đá - Pasteur",
            "Bamos_So10": "Bamos - Số 10",
            "Bamos_KimSon": "Bamos - Kim Sơn",
            "Bamos_DQH": "Bamos - Dương Quảng Hàm"
        };

        const params = new URLSearchParams(window.location.search);
        const storeId = params.get('store') || params.get('id') || 'Khach_Vang_Lai';
        document.getElementById('location-tag').innerText = storeNames[storeId] || "Điểm phát lưu động";

        let userId = "";
        auth.signInAnonymously().then(cred => {
            userId = cred.user.uid;
            checkDeviceLimit();
        });

        async function checkDeviceLimit() {
            const deviceRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('devices').doc(userId);
            const doc = await deviceRef.get();
            if (doc.exists) {
                showSuccess(doc.data().code);
            }
        }

        const form = document.getElementById('sampling-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-submit');
            const phone = document.getElementById('phone').value.trim();
            const age = document.getElementById('age').value;
            const email = document.getElementById('email').value.trim();
            const consent = document.getElementById('consent').checked;

            // KIỂM TRA CHECKBOX ĐỒNG Ý
            if (!consent) {
                alert("Vui lòng tích chọn đồng ý chia sẻ thông tin để tiếp tục!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";

            try {
                // Kiểm tra trùng SĐT theo logic cũ của chị
                const phoneCheck = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations')
                    .where('phone', '==', phone).get();
                
                if (!phoneCheck.empty) {
                    alert("Số điện thoại này đã nhận quà rồi!");
                    btn.disabled = false;
                    btn.innerText = "Xác nhận & Nhận mã";
                    return;
                }

                const giftCode = "LIS" + Math.floor(1000 + Math.random() * 9000);

                // Lưu dữ liệu vào Firestore (Thêm trường consent: true)
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations').add({
                    phone, 
                    age, 
                    email: email || "N/A", 
                    store: storeId, 
                    code: giftCode, 
                    consent: true, // Bằng chứng pháp lý
                    deviceId: userId,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Lưu dấu vết thiết bị
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('devices').doc(userId).set({
                    registered: true, 
                    code: giftCode
                });

                showSuccess(giftCode);

            } catch (error) {
                console.error(error);
                alert("Lỗi kết nối, vui lòng thử lại!");
                btn.disabled = false;
                btn.innerText = "Xác nhận & Nhận mã";
            }
        };

        function showSuccess(code) {
            document.getElementById('code-display').innerText = code;
            document.getElementById('step-success').classList.remove('hidden');
        }
    </script>
</body>
</html>
